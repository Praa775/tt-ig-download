<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok+IG Downloader | Auto Upload ke Catbox + Link Permanen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #0a0a1a, #1a1a2e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
    .card { max-width: 800px; width: 100%; background: rgba(18,18,30,0.92); backdrop-filter: blur(14px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
    .tabs { display: flex; background: #0b0b18; }
    .tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 1rem; font-weight: 700; cursor: pointer; color: #8f8bbd; border-bottom: 2px solid transparent; transition: 0.2s; }
    .tab.active { color: white; }
    .tab.tiktok.active { border-bottom-color: #FE2C55; background: linear-gradient(135deg, #FE2C5510, transparent); }
    .tab.instagram.active { border-bottom-color: #d62976; background: linear-gradient(135deg, #d6297610, transparent); }
    .header { text-align: center; padding: 1.5rem 1rem 0.5rem; }
    .header h1 { font-size: 1.6rem; background: linear-gradient(135deg,#fff,#b9b0ff); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .header p { color: #aaa5d9; font-size: 0.8rem; margin-top: 5px; }
    .content { padding: 1.5rem 2rem 2rem; }
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; color: #cdc9ff; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .url-wrapper { display: flex; gap: 10px; background: rgba(0,0,0,0.5); border-radius: 60px; border: 1px solid rgba(255,255,255,0.2); padding: 5px 5px 5px 22px; align-items: center; }
    .url-wrapper input { flex: 1; background: transparent; border: none; padding: 14px 0; font-size: 1rem; color: white; outline: none; }
    .url-wrapper input::placeholder { color: #6a6790; }
    .paste-btn { background: #2a2a44; border: none; padding: 8px 18px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer; transition: 0.2s; }
    .paste-btn:hover { background: #FE2C55; }
    .process-btn { width: 100%; background: linear-gradient(95deg, #FE2C55, #F25F5C); border: none; padding: 16px; border-radius: 60px; font-weight: 800; font-size: 1rem; color: white; cursor: pointer; margin: 0.5rem 0 1.5rem; transition: all 0.25s; }
    .process-btn.instagram-mode { background: linear-gradient(95deg, #d62976, #fa7e1e); }
    .process-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
    .process-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .result-area { background: rgba(0,0,0,0.45); border-radius: 1.5rem; padding: 1.2rem; display: none; border: 1px solid rgba(255,255,255,0.1); }
    .result-area.show { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .media-preview { text-align: center; margin-bottom: 1rem; }
    .media-preview video, .media-preview img { max-width: 100%; max-height: 360px; border-radius: 1rem; background: black; }
    .success-box { background: #0f0f1a; border-radius: 1rem; padding: 1rem; border: 1px solid #25f4ee30; }
    .link-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #25f4ee; margin-bottom: 8px; }
    .link-url { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: #00000055; padding: 10px 14px; border-radius: 60px; margin-bottom: 12px; }
    .link-url span { flex: 1; font-size: 0.75rem; color: #25f4ee; font-family: monospace; word-break: break-all; }
    .copy-btn, .download-btn { background: #2a2a44; border: none; padding: 8px 18px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; font-size: 0.8rem; transition: 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .copy-btn:hover { background: #25f4ee; color: black; }
    .download-btn { background: #1e6f5c; }
    .download-btn:hover { background: #1a8a72; }
    .button-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
    .error-msg { color: #ff8787; background: #ff000020; padding: 12px; border-radius: 60px; text-align: center; }
    .loader { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e1e32; color: white; padding: 10px 24px; border-radius: 60px; font-size: 0.8rem; z-index: 9999; border-left: 4px solid #25f4ee; pointer-events: none; }
    footer { text-align: center; padding: 1rem; font-size: 0.65rem; color: #5a5780; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 0.5rem; }
    .badge { display: inline-block; background: #25f4ee20; padding: 2px 8px; border-radius: 60px; font-size: 0.6rem; color: #25f4ee; margin-left: 8px; }
  </style>
</head>
<body>
<div class="card">
  <div class="tabs">
    <div class="tab tiktok active" data-platform="tiktok">🎵 TikTok</div>
    <div class="tab instagram" data-platform="instagram">📸 Instagram</div>
  </div>
  <div class="header">
    <h1>🎬 Downloader + Auto Upload ke Catbox</h1>
    <p>Download video TikTok/IG → Upload ke Catbox → Dapatkan link permanen</p>
  </div>
  <div class="content">
    <div class="input-group">
      <label id="urlLabel">🔗 Tempelkan tautan TikTok</label>
      <div class="url-wrapper">
        <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@user/video/...">
        <button class="paste-btn" id="pasteBtn">📋 Tempel</button>
      </div>
    </div>
    <button class="process-btn" id="processBtn">⬇️ Proses & Upload ke Catbox</button>
    <div id="resultPanel" class="result-area"></div>
  </div>
  <footer>🔒 Link dari Catbox.moe • Permanen • Bisa langsung dibagikan</footer>
</div>

<script>
  let currentPlatform = 'tiktok';
  let currentBlobUrl = null;

  const urlInput = document.getElementById('videoUrl');
  const processBtn = document.getElementById('processBtn');
  const resultPanel = document.getElementById('resultPanel');
  const pasteBtn = document.getElementById('pasteBtn');
  const urlLabel = document.getElementById('urlLabel');

  function showToast(msg, isError = false) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    if (isError) toast.style.borderLeftColor = '#fe2c55';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Tab切换
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentPlatform = tab.dataset.platform;
      
      if (currentPlatform === 'tiktok') {
        urlLabel.innerHTML = '🎵 Tempelkan tautan TikTok';
        urlInput.placeholder = 'https://www.tiktok.com/@user/video/123456...';
        processBtn.classList.remove('instagram-mode');
        processBtn.innerHTML = '⬇️ Proses & Upload ke Catbox (TikTok)';
      } else {
        urlLabel.innerHTML = '📸 Tempelkan tautan Instagram (Reel/Post)';
        urlInput.placeholder = 'https://www.instagram.com/reel/xxx atau /p/xxx';
        processBtn.classList.add('instagram-mode');
        processBtn.innerHTML = '⬇️ Proses & Upload ke Catbox (Instagram)';
      }
      resultPanel.classList.remove('show');
      if (currentBlobUrl) {
        URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = null;
      }
    });
  });

  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      if (text && text.trim()) {
        urlInput.value = text.trim();
        showToast('✅ Tautan ditempel');
      } else {
        showToast('❌ Clipboard kosong', true);
      }
    } catch (err) {
      showToast('Izin clipboard diperlukan', true);
    }
  });

  function setLoading(isLoading) {
    if (isLoading) {
      processBtn.disabled = true;
      processBtn.innerHTML = `<span class="loader"></span> Memproses & Upload...`;
    } else {
      processBtn.disabled = false;
      if (currentPlatform === 'tiktok') {
        processBtn.innerHTML = '⬇️ Proses & Upload ke Catbox (TikTok)';
      } else {
        processBtn.innerHTML = '⬇️ Proses & Upload ke Catbox (Instagram)';
      }
    }
  }

  // ========== TIKTOK API (tikwm.com) ==========
  async function fetchTikTokVideo(url) {
    try {
      const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`, {
        headers: {
          'Accept': 'application/json',
          'User-Agent': 'Mozilla/5.0 (Linux; Android 10; K) Chrome/116.0.0.0 Mobile Safari/537.36',
          'Referer': 'https://www.tikwm.com/'
        }
      });
      const json = await response.json();
      if (json.code !== 0 || !json.data) throw new Error('Gagal mengambil data TikTok');
      
      const data = json.data;
      const videoUrl = 'https://www.tikwm.com' + (data.hdplay || data.play);
      return {
        success: true,
        videoUrl: videoUrl,
        title: data.title || 'TikTok Video',
        duration: data.duration
      };
    } catch (err) {
      console.error('TikTok Error:', err);
      return { success: false, error: 'Gagal download TikTok. Cek URL.' };
    }
  }

  // ========== INSTAGRAM API ==========
  async function fetchInstagramVideo(url) {
    try {
      const response = await fetch(`https://api.nexray.web.id/downloader/v2/instagram?url=${encodeURIComponent(url)}`);
      const json = await response.json();
      
      if (!json.status || !json.result || !json.result.media) {
        throw new Error('Gagal mengambil media Instagram');
      }
      
      const mediaList = json.result.media;
      const videos = mediaList.filter(m => m.type === 'mp4');
      
      if (videos.length === 0) {
        return { success: false, error: 'Tidak ada video di postingan ini (mungkin hanya foto)' };
      }
      
      return {
        success: true,
        videoUrl: videos[0].url,
        title: json.result.caption || 'Instagram Video',
        username: json.result.username
      };
    } catch (err) {
      console.error('Instagram Error:', err);
      return { success: false, error: 'Gagal download Instagram. Pastikan URL publik (reel/post video).' };
    }
  }

  // ========== UPLOAD KE CATBOX (seperti kode kamu) ==========
  async function uploadToCatbox(buffer, filename) {
    const formData = new FormData();
    formData.append('reqtype', 'fileupload');
    formData.append('fileToUpload', buffer, filename);
    
    const response = await fetch('https://catbox.moe/user/api.php', {
      method: 'POST',
      body: formData
    });
    
    if (!response.ok) throw new Error('Catbox upload gagal');
    const url = await response.text();
    if (!url.startsWith('https://files.catbox.moe/')) throw new Error('URL tidak valid');
    return url;
  }

  async function processAndUpload() {
    const rawUrl = urlInput.value.trim();
    if (!rawUrl) {
      showToast('Masukkan URL video terlebih dahulu', true);
      return;
    }

    setLoading(true);
    resultPanel.classList.remove('show');
    if (currentBlobUrl) {
      URL.revokeObjectURL(currentBlobUrl);
      currentBlobUrl = null;
    }

    try {
      // 1. Fetch video dari platform
      let fetchResult;
      if (currentPlatform === 'tiktok') {
        fetchResult = await fetchTikTokVideo(rawUrl);
      } else {
        fetchResult = await fetchInstagramVideo(rawUrl);
      }
      
      if (!fetchResult.success) {
        showToast(fetchResult.error, true);
        resultPanel.classList.add('show');
        resultPanel.innerHTML = `<div class="error-msg">❌ ${fetchResult.error}</div>`;
        return;
      }
      
      // 2. Download video ke buffer
      showToast('📥 Mengunduh video...');
      const videoResponse = await fetch(fetchResult.videoUrl);
      if (!videoResponse.ok) throw new Error('Gagal mengunduh video');
      const videoBuffer = await videoResponse.arrayBuffer();
      
      // 3. Upload ke Catbox
      showToast('☁️ Upload ke Catbox...');
      const timestamp = Date.now();
      const filename = `${currentPlatform}_${timestamp}.mp4`;
      const catboxUrl = await uploadToCatbox(new Blob([videoBuffer]), filename);
      
      // 4. Tampilkan hasil dengan link Catbox
      currentBlobUrl = URL.createObjectURL(new Blob([videoBuffer]));
      
      resultPanel.innerHTML = `
        <div class="media-preview">
          <video controls src="${currentBlobUrl}" style="width:100%; border-radius:1rem;"></video>
        </div>
        <div class="success-box">
          <div class="link-label">✅ UPLOAD BERHASIL! LINK PERMANEN:</div>
          <div class="link-url">
            <span id="catboxLink">${catboxUrl}</span>
            <button class="copy-btn" id="copyCatboxBtn">📋 Salin Link</button>
          </div>
          <div class="button-group">
            <a href="${currentBlobUrl}" download="${filename}" class="download-btn">💾 Download Video</a>
          </div>
          <div style="margin-top: 12px; padding: 8px; background: #25f4ee10; border-radius: 60px; text-align: center; font-size: 0.7rem;">
            🔗 <strong>Link Catbox sudah permanen!</strong> Bisa langsung dibagikan atau diupload ke top4top
          </div>
        </div>
      `;
      
      const copyBtn = document.getElementById('copyCatboxBtn');
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(catboxUrl);
          showToast('✅ Link Catbox disalin!');
          copyBtn.textContent = '✅ Tersalin!';
          setTimeout(() => { copyBtn.textContent = '📋 Salin Link'; }, 2000);
        } catch (err) {
          showToast('Gagal menyalin', true);
        }
      });
      
      resultPanel.classList.add('show');
      showToast('✅ Selesai! Link Catbox siap pakai');
      
    } catch (err) {
      console.error(err);
      showToast('Terjadi kesalahan: ' + err.message, true);
      resultPanel.classList.add('show');
      resultPanel.innerHTML = `<div class="error-msg">❌ Gagal: ${err.message}</div>`;
    } finally {
      setLoading(false);
    }
  }

  processBtn.addEventListener('click', processAndUpload);
  urlInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') processAndUpload();
  });
</script>
</body>
</html>
